name: Update lotto data

on:
  workflow_dispatch:
  schedule:
    - cron: "20 14 * * 6"

permissions:
  contents: write

jobs:
  update-lotto-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build data files
        run: node scripts/build-data.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/history.json data/stats.json data/latest.json
          git diff --cached --quiet || git commit -m "Update lotto data"

      - name: Push
        run: git push
